openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Nexora Field AI API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: technicians
    description: Technician profiles
  - name: companies
    description: Company profiles
  - name: service-orders
    description: Service orders / chamados
  - name: applications
    description: Technician applications to service orders
  - name: ratings
    description: Ratings and reviews
  - name: dashboard
    description: Dashboard and analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: OK

  # TECHNICIANS
  /technicians:
    get:
      operationId: listTechnicians
      tags: [technicians]
      summary: List technicians
      parameters:
        - name: specialty
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Technician"

  /technicians/me:
    get:
      operationId: getMyTechnicianProfile
      tags: [technicians]
      summary: Get my technician profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Technician"
    put:
      operationId: upsertTechnicianProfile
      tags: [technicians]
      summary: Create or update my technician profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TechnicianInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Technician"

  /technicians/{id}:
    get:
      operationId: getTechnician
      tags: [technicians]
      summary: Get a technician by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Technician"
        "404":
          description: Not found

  # COMPANIES
  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List companies
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"

  /companies/me:
    get:
      operationId: getMyCompanyProfile
      tags: [companies]
      summary: Get my company profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    put:
      operationId: upsertCompanyProfile
      tags: [companies]
      summary: Create or update my company profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{id}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get a company by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Not found

  # SERVICE ORDERS (CHAMADOS)
  /service-orders:
    get:
      operationId: listServiceOrders
      tags: [service-orders]
      summary: List service orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceOrder"

    post:
      operationId: createServiceOrder
      tags: [service-orders]
      summary: Create a service order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceOrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceOrder"

  /service-orders/{id}:
    get:
      operationId: getServiceOrder
      tags: [service-orders]
      summary: Get a service order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceOrder"
        "404":
          description: Not found

    patch:
      operationId: updateServiceOrder
      tags: [service-orders]
      summary: Update a service order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceOrderUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceOrder"

    delete:
      operationId: deleteServiceOrder
      tags: [service-orders]
      summary: Cancel/delete a service order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No content

  /service-orders/{id}/match:
    get:
      operationId: getAiMatch
      tags: [service-orders]
      summary: Get AI-matched technicians for a service order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TechnicianMatch"

  # APPLICATIONS
  /service-orders/{id}/applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List applications for a service order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"

    post:
      operationId: applyToServiceOrder
      tags: [applications]
      summary: Apply to a service order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{id}/accept:
    patch:
      operationId: acceptApplication
      tags: [applications]
      summary: Accept a technician application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{id}/reject:
    patch:
      operationId: rejectApplication
      tags: [applications]
      summary: Reject a technician application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  # RATINGS
  /ratings:
    post:
      operationId: createRating
      tags: [ratings]
      summary: Create a rating for a completed service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RatingInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rating"

  /ratings/technician/{technicianId}:
    get:
      operationId: listTechnicianRatings
      tags: [ratings]
      summary: List ratings for a technician
      parameters:
        - name: technicianId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rating"

  # DASHBOARD
  /dashboard/admin:
    get:
      operationId: getAdminDashboard
      tags: [dashboard]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /dashboard/company:
    get:
      operationId: getCompanyDashboard
      tags: [dashboard]
      summary: Get company dashboard stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyDashboard"

  /dashboard/technician:
    get:
      operationId: getTechnicianDashboard
      tags: [dashboard]
      summary: Get technician dashboard stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TechnicianDashboard"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # AUTH
    RegisterInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [admin, company, technician]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, company, technician]
        createdAt:
          type: string
          format: date-time

    # TECHNICIANS
    Technician:
      type: object
      required: [id, userId, name, email, city, state, specialties, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        whatsapp:
          type: ["string", "null"]
        cpf:
          type: ["string", "null"]
        city:
          type: string
        state:
          type: string
        photoUrl:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        specialties:
          type: array
          items:
            type: string
        rating:
          type: ["number", "null"]
        totalServices:
          type: integer
        totalEarnings:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time

    TechnicianInput:
      type: object
      required: [name, email, city, state, specialties]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        whatsapp:
          type: string
        cpf:
          type: string
        city:
          type: string
        state:
          type: string
        photoUrl:
          type: string
        bio:
          type: string
        specialties:
          type: array
          items:
            type: string

    TechnicianMatch:
      type: object
      required: [technician, score, reasoning]
      properties:
        technician:
          $ref: "#/components/schemas/Technician"
        score:
          type: number
          description: Match score 0-100
        reasoning:
          type: string

    # COMPANIES
    Company:
      type: object
      required: [id, userId, razaoSocial, cnpj, email, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        razaoSocial:
          type: string
        nomeFantasia:
          type: ["string", "null"]
        cnpj:
          type: string
        responsavel:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: string
        address:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        totalOrders:
          type: integer
        totalSpent:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time

    CompanyInput:
      type: object
      required: [razaoSocial, cnpj, email]
      properties:
        razaoSocial:
          type: string
        nomeFantasia:
          type: string
        cnpj:
          type: string
        responsavel:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string

    # SERVICE ORDERS
    ServiceOrder:
      type: object
      required: [id, companyId, title, description, category, city, state, status, createdAt]
      properties:
        id:
          type: integer
        companyId:
          type: integer
        company:
          $ref: "#/components/schemas/Company"
        assignedTechnicianId:
          type: ["integer", "null"]
        assignedTechnician:
          oneOf:
            - $ref: "#/components/schemas/Technician"
            - type: "null"
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [fibra_optica, redes, infraestrutura, automacao_industrial, cftv, telecom]
        city:
          type: string
        state:
          type: string
        address:
          type: ["string", "null"]
        value:
          type: ["number", "null"]
        sla:
          type: ["string", "null"]
        status:
          type: string
          enum: [aberto, aceito, em_andamento, finalizado, cancelado]
        observations:
          type: ["string", "null"]
        applicationsCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ServiceOrderInput:
      type: object
      required: [title, description, category, city, state]
      properties:
        title:
          type: string
          minLength: 3
        description:
          type: string
        category:
          type: string
          enum: [fibra_optica, redes, infraestrutura, automacao_industrial, cftv, telecom]
        city:
          type: string
        state:
          type: string
        address:
          type: string
        value:
          type: number
        sla:
          type: string

    ServiceOrderUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [fibra_optica, redes, infraestrutura, automacao_industrial, cftv, telecom]
        city:
          type: string
        state:
          type: string
        address:
          type: string
        value:
          type: number
        sla:
          type: string
        status:
          type: string
          enum: [aberto, aceito, em_andamento, finalizado, cancelado]
        observations:
          type: string
        assignedTechnicianId:
          type: ["integer", "null"]

    # APPLICATIONS
    Application:
      type: object
      required: [id, serviceOrderId, technicianId, status, createdAt]
      properties:
        id:
          type: integer
        serviceOrderId:
          type: integer
        technicianId:
          type: integer
        technician:
          $ref: "#/components/schemas/Technician"
        serviceOrder:
          $ref: "#/components/schemas/ServiceOrder"
        status:
          type: string
          enum: [pending, accepted, rejected]
        message:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ApplicationInput:
      type: object
      properties:
        message:
          type: string

    # RATINGS
    Rating:
      type: object
      required: [id, serviceOrderId, technicianId, companyId, score, createdAt]
      properties:
        id:
          type: integer
        serviceOrderId:
          type: integer
        technicianId:
          type: integer
        companyId:
          type: integer
        score:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    RatingInput:
      type: object
      required: [serviceOrderId, technicianId, score]
      properties:
        serviceOrderId:
          type: integer
        technicianId:
          type: integer
        score:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string

    # DASHBOARDS
    AdminDashboard:
      type: object
      required: [totalTechnicians, totalCompanies, totalServiceOrders, revenueSimulated, ordersByStatus, ordersByCategory, recentOrders]
      properties:
        totalTechnicians:
          type: integer
        totalCompanies:
          type: integer
        totalServiceOrders:
          type: integer
        revenueSimulated:
          type: number
        ordersByStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
        ordersByCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/ServiceOrder"

    CompanyDashboard:
      type: object
      required: [activeOrders, finishedOrders, totalSpent, technicianCount, recentOrders, ordersByStatus]
      properties:
        activeOrders:
          type: integer
        finishedOrders:
          type: integer
        totalSpent:
          type: number
        technicianCount:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/ServiceOrder"
        ordersByStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"

    TechnicianDashboard:
      type: object
      required: [availableOrders, acceptedOrders, completedOrders, totalEarnings, recentApplications, rating]
      properties:
        availableOrders:
          type: integer
        acceptedOrders:
          type: integer
        completedOrders:
          type: integer
        totalEarnings:
          type: number
        rating:
          type: ["number", "null"]
        recentApplications:
          type: array
          items:
            $ref: "#/components/schemas/Application"

    StatusCount:
      type: object
      required: [status, count]
      properties:
        status:
          type: string
        count:
          type: integer

    CategoryCount:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
        count:
          type: integer
