kind = "web"
previewPath = "/landing/"
title = "Nexora Field AI — Landing Page"
version = "1.0.0"
id = "artifacts/nexora-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/landing/" ]
localPort = 18143

[services.development]
run = "pnpm --filter @workspace/nexora-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexora-landing", "run", "build" ]
publicDir = "artifacts/nexora-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18143"
BASE_PATH = "/landing/"
